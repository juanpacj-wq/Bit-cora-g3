# Locations de Bitácora para el reverse proxy COMPARTIDO. NO es un server block completo:
# pegá este contenido DENTRO del `server { ... }` que ya sirve el dashboard
# (dashboard-gen-gec3/deploy/nginx.conf), en el placeholder "BITÁCORA (/bitacora)".
#
# Requisitos que deben cumplirse en ese server block:
#   - TLS activo (listen 443 ssl). La cookie de sesión es Secure y el redirect OIDC exige https.
#   - El backend de Bitácora corre en 127.0.0.1:3002 (systemd bitacora-api.service).
#
# Reglas: el backend compara rutas por STRING EXACTO (`/api/...`, `/auth/...`, `/ws/...`), así que
# la barra final en proxy_pass QUITA el prefijo /bitacora. Y hay que reenviar Host + Origin o el
# anti-CSRF (csrfOriginAllowed) y el anti-CSWSH del WS (originPermitido) responden 403; y
# X-Forwarded-Proto o express-session descarta la cookie Secure (trust proxy=1 ya está seteado).

# /bitacora sin barra → /bitacora/
location = /bitacora {
    return 302 /bitacora/;
}

# SPA: estáticos del build. Fallback a index.html del sub-path (no hay rutas server-side; el
# routing del app es por hash, no viaja al servidor). El fallback usa named location (NO el
# tercer parámetro de try_files) porque alias+try_files con URI interna es un pitfall conocido
# de nginx; el rewrite re-entra al matching y se resuelve limpio contra este mismo alias.
location /bitacora/ {
    alias /var/www/bitacora/dist/;
    try_files $uri $uri/ @bitacora_fallback;
}
location @bitacora_fallback {
    rewrite ^ /bitacora/index.html last;
}

# Cache de assets con hash.
location /bitacora/assets/ {
    alias /var/www/bitacora/dist/assets/;
    expires 1y;
    add_header Cache-Control "public, immutable";
}

# API REST → backend Bitácora (strip /bitacora → /api/...).
location /bitacora/api/ {
    proxy_pass http://127.0.0.1:3002/api/;
    proxy_set_header Host $host;
    proxy_set_header Origin $http_origin;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

# OIDC Entra (login/redirect). Navegaciones top-level; la cookie viaja same-origin.
location /bitacora/auth/ {
    proxy_pass http://127.0.0.1:3002/auth/;
    proxy_set_header Host $host;
    proxy_set_header Origin $http_origin;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

# WebSockets (usuarios-activos, conteo-bitacoras). Handshake autenticado por la cookie de sesión;
# el Origin se valida contra Host (anti-CSWSH), por eso ambos se reenvían.
location /bitacora/ws/ {
    proxy_pass http://127.0.0.1:3002/ws/;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header Origin $http_origin;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 86400s;
}
